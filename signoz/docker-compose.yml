version: '3.8'

# SigNoz observability stack
# Start:   docker compose -f signoz/docker-compose.yml up -d
# UI:      http://<your-server-ip>:3301
# NOTE: Run mongo/docker-compose.yml at least once first so pebbles-network exists

services:

  clickhouse:
    image: clickhouse/clickhouse-server:24.1.5-alpine
    container_name: signoz_clickhouse
    hostname: clickhouse
    environment:
      CLICKHOUSE_DB: signoz_metrics
    volumes:
      - signoz_clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/listen_host.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - signoz_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  otel-collector-migrator:
    image: signoz/signoz-schema-migrator:0.102.2
    container_name: otel-migrator
    command:
      - "--dsn=tcp://clickhouse:9000"
      - "--replication=false"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - signoz_network

  otel-collector:
    image: signoz/signoz-otel-collector:0.102.2
    container_name: signoz_otel_collector
    hostname: signoz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP — backend sends here
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - signoz_network
      - pebbles-network   # reachable by pebbles-backend container
    restart: unless-stopped

  query-service:
    image: signoz/query-service:0.49.1
    container_name: signoz_query_service
    hostname: signoz-query-service
    command: ["-config=/root/config/prometheus.yml"]
    environment:
      ClickHouseUrl: tcp://clickhouse:9000
      STORAGE: clickhouse
      GODEBUG: netdns=go
      TELEMETRY_ENABLED: "false"
      DEPLOYMENT_TYPE: docker-standalone-amd
    volumes:
      - ./prometheus.yml:/root/config/prometheus.yml
      - signoz_query_data:/var/lib/signoz
    ports:
      - "8080:8080"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - signoz_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    image: signoz/frontend:0.49.1
    container_name: signoz_frontend
    volumes:
      - ./signoz-nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "3301:3301"
    depends_on:
      query-service:
        condition: service_healthy
    networks:
      - signoz_network
    restart: unless-stopped

volumes:
  signoz_clickhouse_data:
  signoz_query_data:

networks:
  signoz_network:
    driver: bridge
  pebbles-network:
    external: true
    name: pebbles-network
